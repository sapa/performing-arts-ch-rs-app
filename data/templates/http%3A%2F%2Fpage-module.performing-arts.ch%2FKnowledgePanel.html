<div class="sari-page-header">
    <div class="sari-page-header-thumbnail">
        <mp-resource-thumbnail iri='[[this]]'></mp-resource-thumbnail>
    </div>
    <div class="sari-page-header-content">
        <h1>
            <mp-label iri='[[this]]'></mp-label>
        </h1>

        <p class="knowledge-panel__uri">
            <b>URI</b>:
            <a href='[[this]]' style="font-size: 12px; text-decoration: underline;" target='_blank'>
                <span>[[this]]</span>
            </a>
            <mp-copy-to-clipboard text='[[this]]'>
                <button class='btn btn-link btn-sm knowledge-panel__uri-copy-button'>
                    <i class='fa fa-clipboard'></i>
                </button>
            </mp-copy-to-clipboard>
        </p>

        <!--Types -->
        <p>
            <b>Type</b>: <semantic-query
                query="SELECT DISTINCT ?type WHERE { <[[this]]> [[#if type]][[type]][[else]]a[[/if]] ?type }"
                style="display:inline;"></semantic-query>
        </p>

        <!--Description -->
        <p>
            <semantic-query
                query='SELECT ?description WHERE { <[[this]]> [[#if description]][[description]][[else]]crm:P2_has_type[[/if]] ?description } LIMIT 1'
                template='{{#each bindings}}<span><b>Description</b>: <mp-label iri="{{description.value}}"></mp-label></span>{{/each}}'>
            </semantic-query>
        </p>
    </div>
</div>
